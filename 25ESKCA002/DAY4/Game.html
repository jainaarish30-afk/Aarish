<!DOCTYPE html>
<html>
<head>
    <title>Fruit Game</title>

    <style>
        body{
            background-color: white;
            font-family: Arial;
        }

        h1{
            text-align: center;
        }

        #score{
            text-align: center;
            font-size: 25px;
            margin-bottom: 10px;
        }

        #timer{
            text-align: center;
            font-size: 30px;
            color: red;
            margin-bottom: 20px;
        }

        #game{
            position: relative;
            width: 100%;
            height: 500px;
        }

        #apple{
            position: absolute;
            font-size: 150px;
            cursor: pointer;
        }

        #banana{
            position: absolute;
            font-size: 150px;
            cursor: pointer;
        }
    </style>

</head>

<body>

<h1>Fruit Click Game</h1>

<div id="score">
    🍎 Apple : <span id="appleScore">0</span>
    &nbsp;&nbsp;&nbsp;&nbsp;
    🍌 Banana : <span id="bananaScore">0</span>
</div>

<div id="timer">
    ⏳ Time Left: <span id="time">02:00</span>
</div>

<div id="game">

    <div id="apple">🍎</div>

    <div id="banana">🍌</div>

</div>

<script>

var apple = document.getElementById("apple");
var banana = document.getElementById("banana");

var appleScore = 0;
var bananaScore = 0;

apple.style.left = "100px";
apple.style.top = "100px";

banana.style.left = "300px";
banana.style.top = "200px";

// Apple Click
apple.onclick = function(){

    appleScore++;
    document.getElementById("appleScore").innerHTML = appleScore;

    var x = Math.floor(Math.random()*900);
    var y = Math.floor(Math.random()*400);

    apple.style.left = x + "px";
    apple.style.top = y + "px";
}

// Banana Click
banana.onclick = function(){

    bananaScore++;
    document.getElementById("bananaScore").innerHTML = bananaScore;

    var x = Math.floor(Math.random()*900);
    var y = Math.floor(Math.random()*400);

    banana.style.left = x + "px";
    banana.style.top = y + "px";
}

// ===== 2 Minute Timer =====
var timeLeft = 120;

var timer = setInterval(function(){

    var minutes = Math.floor(timeLeft / 60);
    var seconds = timeLeft % 60;

    document.getElementById("time").innerHTML =
        String(minutes).padStart(2,"0") + ":" +
        String(seconds).padStart(2,"0");

    if(timeLeft == 0){

        clearInterval(timer);

        apple.onclick = null;
        banana.onclick = null;

        if(appleScore > bananaScore){
            alert("⏰ Time Over!\n\n🍎 Apple Wins!");
        }
        else if(bananaScore > appleScore){
            alert("⏰ Time Over!\n\n🍌 Banana Wins!");
        }
        else{
            alert("⏰ Time Over!\n\n🤝 Match Draw!");
        }
    }

    timeLeft--;

},1000);

</script>

</body>
</html>
