<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <h2 class="text-center mb-4">Student Records</h2>

    <input
        type="text"
        id="searchInput"
        class="form-control mb-4"
        placeholder="Search by name..."
    >

    <div id="container" class="row g-4"></div>
</div>

<script>
const students = [
    { name: "Aarish", branch: "AI", cgpa: "9.8" },
    { name: "Anurag", branch: "AI", cgpa: "9.4" },
    { name: "Abhishek", branch: "AI", cgpa: "9.3" },
    { name: "Saksham", branch: "AI", cgpa: "9.4" },
    { name: "Ankit", branch: "AI", cgpa: "9.4" },
    { name: "Garvit", branch: "AI", cgpa: "9.5" },
    { name: "Priyank", branch: "AI", cgpa: "9.6" },
    { name: "Akshat", branch: "AI", cgpa: "9.7" },
    { name: "Ayush", branch: "AI", cgpa: "9.8" },
    { name: "Aditya", branch: "AI", cgpa: "9.0" }
];

let html = "";

students.forEach(student => {
    html += `
        <div class="col-md-4 card-item">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h4>${student.name}</h4>
                    <button class="btn btn-primary btn-sm show-btn mt-2">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">
                        <p><strong>Branch:</strong> ${student.branch}</p>
                        <p><strong>CGPA:</strong> ${student.cgpa}</p>
                    </div>
                </div>
            </div>
        </div>
    `;
});

$("#container").html(html);

$(document).on("click", ".show-btn", function () {
    $(this).next(".details").slideToggle();
});

$("#searchInput").on("input", function () {
    let value = $(this).val().toLowerCase();

    $(".card-item").each(function () {
        let name = $(this).find("h4").text().toLowerCase();

        if (name.includes(value)) {
            $(this).show();
        } else {
            $(this).hide();
        }
    });
});
document.getElementById("json").innerHTML = JSON.stringify(students, ["name","cgpa", "branch",4], 2);

function replacer(key,value){
    if(key == "cgpa")
    return undefined;
    return value;
}

</script>

</body>
</html>
